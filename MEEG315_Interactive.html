<body>
    <div class="mcq">
        <h2>Multiple Choice Questions</h2>
        <form>
            <div class="question" data-answer="B">
                <p>What is the capital of France?</p>
                <input type="radio" name="q1" value="A"> A) London<br>
                <input type="radio" name="q1" value="B"> B) Paris<br>
                <input type="radio" name="q1" value="C"> C) Berlin<br>
            </div>
            <div class="question" data-answer="A">
                <p>What is 2 + 2?</p>
                <input type="radio" name="q2" value="A"> A) 4<br>
                <input type="radio" name="q2" value="B"> B) 3<br>
                <input type="radio" name="q2" value="C"> C) 5<br>
            </div>
            <div class="question" data-answer="C">
                <p>Which planet is known as the Red Planet?</p>
                <input type="radio" name="q3" value="A"> A) Venus<br>
                <input type="radio" name="q3" value="B"> B) Jupiter<br>
                <input type="radio" name="q3" value="C"> C) Mars<br>
            </div>
            <!-- Add more questions as needed -->
            <button type="submit">Submit</button>
        </form>
    </div>

        // JavaScript for handling the quiz logic
    </script>
