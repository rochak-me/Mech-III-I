    <title>Study Hub UI</title>
    <style>
        /* Add your styles here */
        @media (max-width: 900px) {
            /* Styles for mobile sidebar toggle */
            .sidebar {
                position: absolute;
                transition: all 0.3s;
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
        }
        .focus-visible {
            outline: 2px solid blue;
        }
    </style>
</head>

    <div class="topbar">
        <button aria-controls="sidebar" id="sidebar-toggle">Toggle Sidebar</button>
    </div>
    <div class="sidebar" id="sidebar">
        <button class="sidebar-item" aria-current="true">Item 1</button>
        <button class="sidebar-item">Item 2</button>
    </div>
    <div class="content">
        <h2 tabindex="0">Section Header</h2>
        <p>Your content here...</p>
    </div>
    <script>
        // JavaScript for toggle button
        document.getElementById('sidebar-toggle').addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });

        // Make section headers and MCQ options keyboard accessible
        const sectionHeaders = document.querySelectorAll('.topbar h2');
        sectionHeaders.forEach(header => {
            header.addEventListener('keydown', function(event) {
                if (event.key === 'Enter' || event.key === ' ') {
                    header.click();
                }
            });
        });

</html>
